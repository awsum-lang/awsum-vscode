name: CI

on:
  workflow_call:
    inputs:
      upload-artifacts:
        description: "Upload the built .vsix as a workflow artifact (consumed by the release workflow)."
        type: boolean
        default: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24.14
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Package
        run: npm run package

      - name: Read version
        if: inputs.upload-artifacts
        id: version
        run: echo "value=$(node -p 'require(\"./package.json\").version')" >> "$GITHUB_OUTPUT"

      - name: Upload .vsix artifact
        if: inputs.upload-artifacts
        uses: actions/upload-artifact@v7
        with:
          name: awsum-vscode-${{ steps.version.outputs.value }}-vsix
          path: "*.vsix"
          if-no-files-found: error
          retention-days: 7
