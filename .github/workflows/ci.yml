name: CI

on:
  workflow_call:

jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24.14
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Package
        run: npm run package
