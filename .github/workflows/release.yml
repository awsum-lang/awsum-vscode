name: Release

# Tag is the source of truth: pushing `v*` is what creates an immutable release
# tied to a specific commit. There is intentionally no `workflow_dispatch` here —
# if a release run fails, delete the tag, fix, retag.
on:
  push:
    tags:
      - "v*"

# Don't cancel a release mid-flight if a second tag arrives somehow.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # `vsce package` reads the version from `package.json` and bakes it into the
  # `.vsix` filename, so a tag/package.json mismatch would silently produce an
  # asset whose name disagrees with the release tag. Fail fast before the build.
  verify-version:
    name: Verify tag matches package.json
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Check version
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF_NAME#v}"
          pkg_version="$(node -p 'require("./package.json").version')"
          if [[ "$tag_version" != "$pkg_version" ]]; then
            echo "Tag $GITHUB_REF_NAME implies version $tag_version, but package.json has $pkg_version" >&2
            exit 1
          fi

  ci:
    needs: verify-version
    uses: ./.github/workflows/ci.yml
    with:
      upload-artifacts: true

  release:
    name: Publish GitHub Release
    needs: ci
    runs-on: ubuntu-24.04
    permissions:
      # Required for `gh release create` to upload assets.
      contents: write
      # Required for `actions/attest-build-provenance` — it mints an OIDC token
      # to identify the workflow to Sigstore, and writes the attestation entry.
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v6

      - name: Download .vsix artifact
        uses: actions/download-artifact@v8
        with:
          pattern: awsum-vscode-*-vsix
          path: dist
          merge-multiple: true

      # Users verify with:
      #   gh attestation verify awsum-vscode-X.Y.Z.vsix --repo awsum-lang/awsum-vscode
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/*.vsix

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes "See [CHANGELOG.md](./CHANGELOG.md)" \
            dist/*.vsix
